# One-step smoke for the stronger two-hop fill SFT.
defaults:
  - ../../configs/base/sft.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/qa_fill_sft_v3.yaml

sft:
  max_num_epochs: 1
  max_num_steps: 1
  val_period: 1
  val_batches: 1
  val_global_batch_size: 4
  val_micro_batch_size: 1
  val_at_start: false
  val_at_end: true
  seed: 84
  only_unmask_final: false

checkpointing:
  metric_name: "val:val_loss"
  higher_is_better: false
  keep_top_k: 1
  save_period: 1
  save_optimizer: true
