# One-epoch fill SFT pilot from the merged retrieval-SFT step 50 model.
defaults:
  - ../../configs/base/sft.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/qa_fill_sft_pilot.yaml

sft:
  max_num_epochs: 1
  max_num_steps: 20
  val_period: 13
  val_batches: 3
  val_global_batch_size: 4
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: true
  seed: 42
  only_unmask_final: false

checkpointing:
  metric_name: "val:val_loss"
  higher_is_better: false
  keep_top_k: 2
  save_period: 13
  save_optimizer: true
