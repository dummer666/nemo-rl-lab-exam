# Twenty-step objective-heavy SFT behavior pilot.
defaults:
  - ../../configs/base/sft.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/qa_objective_sft.yaml

sft:
  max_num_epochs: 1
  max_num_steps: 20
  val_period: 10
  val_batches: 37
  val_global_batch_size: 8
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: true
  seed: 73
  only_unmask_final: false

checkpointing:
  metric_name: "val:val_loss"
  higher_is_better: false
  keep_top_k: 3
  save_period: 10
  save_optimizer: true
