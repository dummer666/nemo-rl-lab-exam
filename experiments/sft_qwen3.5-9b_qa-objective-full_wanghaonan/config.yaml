# User-authorized full objective SFT continuation from the selected pilot step 20.
defaults:
  - ../../configs/base/sft.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/qa_objective_sft.yaml

policy:
  model_name: "/shared/outputs/wanghaonan/sft_qwen3.5-9b_qa-objective-pilot_wanghaonan/sft_qwen3.5-9b_qa-objective-pilot_wanghaonan-wanghaonan-20260719-105248/hf_export/step_20"
  tokenizer:
    name: ${policy.model_name}
  megatron_cfg:
    optimizer:
      lr: 4.0e-6
      min_lr: 4.0e-7
      weight_decay: 0.0
    scheduler:
      lr_decay_style: "cosine"
      lr_warmup_iters: 5
      lr_warmup_init: 4.0e-7
      lr_decay_iters: 250

sft:
  max_num_epochs: 1
  max_num_steps: 250
  val_period: 50
  val_batches: 37
  val_global_batch_size: 8
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: true
  seed: 74
  only_unmask_final: false

checkpointing:
  metric_name: "val:val_loss"
  higher_is_better: false
  keep_top_k: 6
  save_period: 50
  save_optimizer: true
