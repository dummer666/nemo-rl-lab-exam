# QA Agent v3 smoke: cleaned curriculum + search warmup + incremental evidence reward.
defaults:
  - ../../configs/base/grpo_math_1B.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/base/grpo_megatron.yaml
  - ../../configs/base/grpo_lora.yaml

policy:
  model_name: "Qwen/Qwen3.5-9B-Base"
  tokenizer:
    name: "Qwen/Qwen3.5-9B-Base"
  max_total_sequence_length: 6144
  train_global_batch_size: 32
  generation_batch_size: 16
  generation:
    max_new_tokens: 1536
    temperature: 1.0
    top_p: 0.95
    top_k: 10000
  megatron_cfg:
    peft:
      dim: 16
      alpha: 32
    optimizer:
      lr: 8.0e-5
      min_lr: 8.0e-6
    scheduler:
      lr_warmup_iters: 10
      lr_decay_iters: 120

grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 8
  max_rollout_turns: 3
  max_num_steps: 30
  val_period: 10
  val_at_start: true
  val_at_end: true
  max_val_samples: 128
  val_batch_size: 32
  overlong_filtering: true

loss_fn:
  reference_policy_kl_penalty: 0.01

data:
  shuffle: false
  input_key: query
  output_key: expected_answer
  system_prompt: null
  data_dir: /data/datasets/qa_rl
  clean_train_path: /shared/outputs/wanghaonan/qa_training_clean_wanghaonan/qa_training_clean_wanghaonan-wanghaonan-20260718-092437/cleaned_data/clean_train.jsonl
  curriculum:
    warmup_steps: 10

env:
  _override_: true
  qa_retrieval:
    cfg:
      docs_dir: /data/docs
      top_k: 4
      candidate_k: 50
      quality_rerank: true
      quality_weights:
        answer-bearing: 1.15
        reference: 1.0
        question-only: 0.45
        noise: 0.1
      chunk_chars: 1200
      chunk_overlap_chars: 160
      max_result_chars: 1800
      per_result_chars: 360
      bm25_k1: 1.5
      bm25_b: 0.75
      max_searches: 2
      max_invalid_actions: 2
      use_judge: false
      evidence_reward_scale: 0.10
      search_cost: 0.01
      duplicate_query_penalty: 0.02

logger:
  wandb_enabled: false
  tensorboard_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  num_val_samples_to_print: 10
